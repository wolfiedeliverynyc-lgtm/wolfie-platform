# ══════════════════════════════════════════════════════════════
# WOLFIE DELIVERY — docker-compose.yml
# ══════════════════════════════════════════════════════════════
# Services: api · worker · beat · flower · redis
# Usage:
#   docker-compose up --build
#   docker-compose scale worker=3
#   docker-compose logs -f worker

version: "3.9"

x-wolfie-build: &wolfie-build
  build:
    context: .
    dockerfile: Dockerfile
  volumes:
    - .:/app
  depends_on:
    redis:
      condition: service_healthy

x-wolfie-env: &wolfie-env
  env_file: .env
  environment:
    REDIS_URL: redis://redis:6379

services:

  # ── Flask API ─────────────────────────────────────────────────
  api:
    <<: [*wolfie-build, *wolfie-env]
    container_name: wolfie_api
    environment:
      REDIS_URL: redis://redis:6379
      PORT: 5000
    ports:
      - "5000:5000"
    command: >
      gunicorn wsgi:app
        --worker-class geventwebsocket.gunicorn.workers.GeventWebSocketWorker
        --workers 2
        --bind 0.0.0.0:5000
        --timeout 120
        --log-level info
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Celery Worker ─────────────────────────────────────────────
  worker:
    <<: [*wolfie-build, *wolfie-env]
    container_name: wolfie_worker
    environment:
      REDIS_URL: redis://redis:6379
    command: >
      celery -A celery_app worker
        --loglevel=info
        --queues=notifications,matching,payouts,analytics,default
        --concurrency=4
        --max-tasks-per-child=100
        --hostname=worker@%h
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "celery", "-A", "celery_app", "inspect", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Celery Beat ───────────────────────────────────────────────
  beat:
    <<: [*wolfie-build, *wolfie-env]
    container_name: wolfie_beat
    environment:
      REDIS_URL: redis://redis:6379
    command: >
      celery -A celery_app beat
        --loglevel=info
    restart: unless-stopped
    deploy:
      replicas: 1

  # ── Flower Monitor ────────────────────────────────────────────
  flower:
    <<: [*wolfie-build, *wolfie-env]
    container_name: wolfie_flower
    environment:
      REDIS_URL: redis://redis:6379
    command: >
      celery -A celery_app flower
        --port=5555
        --broker=redis://redis:6379/5
        --basic_auth=admin:wolfie123
    ports:
      - "5555:5555"
    depends_on:
      - worker
    restart: unless-stopped

  # ── Redis ─────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: wolfie_redis
    command: >
      redis-server
        --maxmemory 256mb
        --maxmemory-policy allkeys-lru
        --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis_data:
    driver: local

networks:
  default:
    name: wolfie_network
